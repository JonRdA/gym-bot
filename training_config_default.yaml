# Training config template for new users.
#
# Two sections:
#   - exercises: the catalog — each exercise defined ONCE with its metrics
#   - workouts:  named lists of exercise references (ordered)
#
# To track rest time for an exercise, set `track_rest: true`. You will be
# prompted once at the start of the exercise during /add for the rest value
# (seconds between sets). Remove/comment the flag to stop tracking.

exercises:
  # --- pull ---
  # pullup:       { metrics: [reps, weight], track_rest: true }
  pullup:       { metrics: [reps, weight] }
  row:          { metrics: [reps] }
  biceps_curl:  { metrics: [reps, weight] }

  # --- push ---
  pike_pushup:       { metrics: [reps] }
  pushup:            { metrics: [reps] }
  triceps_extension: { metrics: [reps, weight] }

  # --- lower ---
  backsquat:      { metrics: [reps, weight] }
  deadlift:       { metrics: [reps, weight] }
  jefferson_curl: { metrics: [reps, weight] }
  goodmorning:    { metrics: [reps, weight] }

  # --- handstand ---
  chest2wall:   { metrics: [time] }

  # --- pancake ---
  straddle_jefferson_curl: { metrics: [reps, weight] }

  # --- home ---
  rice_bucket:    { metrics: [time] }
  squat2sissy:    { metrics: [reps, feet2floor] }
  heel_elevation: { metrics: [reps, weight] }
  towel_roll:     { metrics: [reps, weight] }

  # --- cardio ---
  run:          { metrics: [time, distance] }

workouts:
  pull:      [pullup, row, biceps_curl]
  push:      [pike_pushup, pushup, triceps_extension]
  lower:     [backsquat, jefferson_curl, deadlift]
  handstand: [chest2wall]
  pancake:   [straddle_jefferson_curl]
  run:       [run]
  # home:      [rice_bucket, squat2sissy, heel_elevation, towel_roll, pushup]
